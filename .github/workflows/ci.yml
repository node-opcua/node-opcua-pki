name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false # prevent test to stop if one fails
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.pkg-cache/
          key: ${{  matrix.os }}-${{ matrix.node-version }}

      - name: openssl
        run: openssl version

      - name: nodejs
        run: node --version

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:all

  # ── Alpine (OpenSSL 3.5.x) ──────────────────────────────────────
  # Alpine ships OpenSSL 3.5+ which enforces stricter X.509 extension
  # validation (e.g. authorityKeyIdentifier=keyid:always fails during
  # root CA CSR generation). This job catches regressions that only
  # manifest on newer OpenSSL versions.
  test-alpine:
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    runs-on: ubuntu-latest
    container:
      image: node:${{ matrix.node-version }}-alpine
    steps:
      - name: Install build deps (git, openssl, python, make, g++)
        run: apk add --no-cache git openssl python3 make g++

      - name: Checkout
        uses: actions/checkout@v4

      - name: Versions
        run: |
          node --version
          openssl version

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:all

  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run build
      - run: npm install nyc @istanbuljs/nyc-config-typescript

      - name: Run tests with coverage
        run: npx nyc mocha

      - name: Generate lcov report
        run: npx nyc report --reporter=lcov

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
